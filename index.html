<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-gallery</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <main>

        <div class="header">
            <img src="./assets/img/e logo.png" id="logo" alt="logo E-gallery">
            <div class="header-left">

                <h3>Crée / Expose / Inspire</h3>
                <div class="img-header">
                    <img src="./assets/img/photo header.png" alt="image art">
                </div>
            </div>
            <div class="header-right">
                <div class="connexion">
                    <h4>Se connecter à E-gallery</h4>
                    <form action="">
                        <input type="email" placeholder="Adresse e-mail">
                        <input type="password" placeholder="Mot de passe">
                        <input id="button" type="submit" value="Se connecter">
                        <a id="mdp" href="#">Mot de passe oublié ?</a>
                    </form>

                </div>
                <div class="inscription">
                    <p><a href="/page/inscription.html">S'inscrire</a></p>
                    <p><a href="#">Continuer comme visiteur</a></p>
                </div>
            </div>

        </div>
    </main>
    <footer>
        <nav>
            <ul>
                <li>A propos</li>
                <li>Contact</li>
                <li>Aide</li>
            </ul>
        </nav>
    </footer>

</body>

</html>
