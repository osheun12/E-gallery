<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-gallery</title>
    <link rel="stylesheet" href="/style/inscription.css">

</head>

<body>
    <h2>Lancez vous sur E-gallery</h2>
    <p>Inscrivez-vous, partagez et vendez vos oeuvres</p>
    <div class="formulaire">
        <form action="">
            <div class="champ">
                <label for="email">Adresse e-mail</label><br>
                <input id="email" type="email"><br>
                <label for="mdp">Mot de passe</label><br>
                <input type="password" name="" id="mdp"><br>
            </div>

            <div class="date">
                <label for="date">Date de naissance</label><br>
                <input id="date" type="text" placeholder="Jour" maxlength="2">
                <input id="date" type="text" placeholder="Mois" maxlength="2">
                <input id="date" type="text" placeholder="Année" maxlength="4"><br>
            </div>

            <div class="actions">
                <label for="pseudo">Pseudo</label><br>
                <input type="text" id="pseudo"><br>
                <input type="submit" name="" id="btn-submit" value="S'inscrire">
            </div>
        </form>
    </div>
</body>

</html>
